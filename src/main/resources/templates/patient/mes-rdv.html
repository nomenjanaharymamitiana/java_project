<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Rendez-vous | MediAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-info py-3">
        <div class="container">
            <a class="navbar-brand" href="/patient"><i class="fas fa-heartbeat me-2"></i>Mes Rendez-vous</a>
            <div class="ms-auto">
                <a href="/patient" class="btn btn-outline-light btn-sm rounded-pill px-3">Retour</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow-sm p-4 mb-4">
            <div class="row g-3 align-items-end">
                <div class="col-md-8">
                    <label class="form-label">Entrez votre ID Patient pour voir vos rendez-vous</label>
                    <input type="text" id="idpatInput" class="form-control" placeholder="Ex: P001">
                </div>
                <div class="col-md-4">
                    <button onclick="chargerMesRdvs()" class="btn btn-info w-100 text-white">Afficher</button>
                </div>
            </div>
        </div>

        <div id="mesRdvs" class="row g-3">
            <!-- Loaded via JS -->
        </div>
    </div>

    <script>
        async function chargerMesRdvs() {
            const idpat = document.getElementById('idpatInput').value;
            if (!idpat) return;

            const res = await fetch('/api/rdv/liste');
            const allRdvs = await res.json();
            const filtered = allRdvs.filter(r => r.idpat === idpat);

            const container = document.getElementById('mesRdvs');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="alert alert-warning">Aucun rendez-vous trouvé pour cet ID.</div>';
                return;
            }

            filtered.forEach(rdv => {
                const statusBadge = rdv.status === 'CANCELLED' ? 'bg-danger' : 'bg-success';
                container.innerHTML += `
                    <div class="col-md-6">
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between">
                                    <h5 class="fw-bold">Rendez-vous #${rdv.idrdv}</h5>
                                    <span class="badge ${statusBadge}">${rdv.status}</span>
                                </div>
                                <p class="mb-1"><i class="fas fa-user-md me-2"></i>Médecin ID: ${rdv.idmed}</p>
                                <p class="mb-2"><i class="fas fa-clock me-2"></i>${new Date(rdv.dateRdv).toLocaleString()}</p>
                                ${rdv.status !== 'CANCELLED' ? 
                                    `<button onclick="annuler('${rdv.idrdv}')" class="btn btn-sm btn-outline-danger">Annuler le rendez-vous</button>` : 
                                    ''}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function annuler(id) {
            if (confirm('Voulez-vous annuler ce rendez-vous ?')) {
                const res = await fetch('/api/rdv/annuler/' + id, { method: 'POST' });
                if (res.ok) {
                    alert('Rendez-vous annulé.');
                    chargerMesRdvs();
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Planning des Rendez-vous | MediAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4"><i class="fas fa-calendar-check text-primary me-2"></i>Tous les Rendez-vous</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>ID RDV</th>
                            <th>Patient</th>
                            <th>Médecin</th>
                            <th>Date & Heure</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="rdvTable">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-4">
            <a href="/Admin-acceuil" class="btn btn-secondary">Retour</a>
        </div>
    </div>

    <script>
        async function loadRdvs() {
            const res = await fetch('/api/rdv/liste');
            const rdvs = await res.json();
            const table = document.getElementById('rdvTable');
            table.innerHTML = '';

            rdvs.forEach(rdv => {
                const statusBadge = rdv.status === 'CANCELLED' ? 'bg-danger' : 'bg-success';
                table.innerHTML += `
                    <tr>
                        <td>${rdv.idrdv}</td>
                        <td>${rdv.idpat}</td>
                        <td>${rdv.idmed}</td>
                        <td>${new Date(rdv.dateRdv).toLocaleString()}</td>
                        <td><span class="badge ${statusBadge}">${rdv.status}</span></td>
                        <td>
                            ${rdv.status !== 'CANCELLED' ? 
                                `<button onclick="annuler('${rdv.idrdv}')" class="btn btn-sm btn-danger">Annuler</button>` : 
                                ''}
                            <button onclick="supprimer('${rdv.idrdv}')" class="btn btn-sm btn-outline-secondary"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        async function annuler(id) {
            if (confirm('Voulez-vous vraiment annuler ce rendez-vous ?')) {
                const res = await fetch('/api/rdv/annuler/' + id, { method: 'POST' });
                if (res.ok) {
                    loadRdvs();
                }
            }
        }

        async function supprimer(id) {
            if (confirm('Supprimer définitivement ce rendez-vous de la base ?')) {
                const res = await fetch('/api/rdv/supprimer/' + id, { method: 'DELETE' });
                if (res.ok) {
                    loadRdvs();
                }
            }
        }

        loadRdvs();
    </script>
</body>
</html>

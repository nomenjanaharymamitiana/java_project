<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recherche Médecin | MediAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4"><i class="fas fa-search me-2"></i>Recherche de Médecin</h2>
        
        <div class="card shadow-sm p-4 mb-4">
            <div class="row g-3">
                <div class="col-md-10">
                    <input type="text" id="nommed" class="form-control" placeholder="Entrez le nom du médecin...">
                </div>
                <div class="col-md-2">
                    <button onclick="rechercher()" class="btn btn-primary w-100">Rechercher</button>
                </div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Spécialité</th>
                            <th>Lieu</th>
                            <th>Taux Horaire</th>
                        </tr>
                    </thead>
                    <tbody id="resultats">
                        <!-- JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="mt-4">
            <a href="/Admin-acceuil" class="btn btn-secondary">Retour</a>
        </div>
    </div>

    <script>
        async function rechercher() {
            const nom = document.getElementById('nommed').value;
            const res = await fetch('/api/medecins/recherche?nom=' + nom);
            const meds = await res.json();
            const table = document.getElementById('resultats');
            table.innerHTML = '';

            meds.forEach(med => {
                table.innerHTML += `
                    <tr>
                        <td>${med.idmed}</td>
                        <td>${med.nommed}</td>
                        <td>${med.specialite}</td>
                        <td>${med.lieu}</td>
                        <td>${med.taux_horaire} Ar/h</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>

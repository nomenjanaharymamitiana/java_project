<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier Praticien | MediAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 p-4">
                    <h2 class="fw-bold mb-4"><i class="fas fa-user-edit me-2 text-primary"></i>Modifier le médecin</h2>

                    <form th:action="@{/medecin/update}" th:object="${medecin}" method="POST">
                        
                        <input type="hidden" th:field="*{idmed}">
                        <input type="hidden" th:field="*{password}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nom complet</label>
                                <input type="text" th:field="*{nommed}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Spécialité</label>
                                <input type="text" th:field="*{specialite}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Lieu d'exercice</label>
                                <input type="text" th:field="*{lieu}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Tarif Horaire (Ar)</label>
                                <input type="number" th:field="*{taux_horaire}" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">Email professionnel</label>
                                <input type="email" th:field="*{email}" class="form-control" required>
                            </div>
                        </div>

                        <div class="mt-5 d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fas fa-save me-2"></i>Enregistrer
                            </button>
                            <a th:href="@{/medecin/liste-docteur}" class="btn btn-light border px-4">
                                Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

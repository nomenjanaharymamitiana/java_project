<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Médecins</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/medecin"><i class="fas fa-heartbeat"></i> MediAdmin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li><a class="nav-link" href="/medecin"><i class="fas fa-home"></i> Accueil</a></li>
                    <li><a class="nav-link active" href="/medecin/liste"><i class="fas fa-user-md"></i> Médecins</a></li>
                    <li><a class="nav-link" href="/patient"><i class="fas fa-user-injured"></i> Patients</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mt-5">
            <h2 class="fw-bold">Annuaire des Médecins</h2>
            <button class="btn btn-primary btn-action"><i class="fas fa-plus me-2"></i>Ajouter un médecin</button>
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nom du Docteur</th>
                        <th>Spécialité</th>
                        <th>Lieu</th>
                        <th>Tarif Horaire</th>
                        <th>Email</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${medecins}">
                        <td th:text="${m.idmed}" class="text-muted small"></td>
                        <td class="fw-bold" th:text="${m.nommed}">Dr. Nom</td>
                        <td><span class="badge-spec" th:text="${m.specialite}">Spécialité</span></td>
                        <td th:text="${m.lieu}">Ville</td>
                        <td th:text="${m.taux_horaire} + ' Ar'">0 Ar</td>
                        <td th:text="${m.email}">Email</td>
                        <td class="text-center">
                            <a th:href="@{/medecin/modifier/{id}(id=${m.idmed})}" 
                               class="btn btn-sm btn-outline-secondary me-1 shadow-sm">
                                <i class="fas fa-edit"></i>
                            </a>
                            
                            <button class="btn btn-sm btn-outline-danger shadow-sm">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>

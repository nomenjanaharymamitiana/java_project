<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion Docteur | MediAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { background: #f8f9fa; height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 400px; width: 100%; margin: auto; border: none; border-radius: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card login-card shadow-lg p-4">
        <div class="text-center mb-4">
            <div class="text-primary mb-2"><i class="fas fa-user-md fa-3x"></i></div>
            <h3 class="fw-bold">Accès Praticien</h3>
            <p class="text-muted small">Veuillez vous identifier pour gérer vos RDV</p>
        </div>
        
        <form th:action="@{/logindocteur}" method="POST"> 
            <div class="mb-3">
                <label class="form-label small fw-bold">Email Professionnel</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                        <input type="email" 
                               name="email" 
                               class="form-control border-start-0" 
                               placeholder="dr.mamitiana@eni.mg" 
                               required>
                    </div>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" 
                               name="password" 
                               class="form-control border-start-0" 
                               placeholder="••••••••" 
                               required>
                    </div>
                </div>
            </div>
            
            <div th:if="${error}" class="alert alert-danger border-0 small mb-3">
                <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span>
            </div>
        
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">
                Se connecter <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>
        <div class="text-center mt-4">
            <a href="/" class="text-decoration-none small text-muted"><i class="fas fa-chevron-left me-1"></i> Retour à l'accueil</a>
        </div>
    </div>
</div>

</body>
</html>

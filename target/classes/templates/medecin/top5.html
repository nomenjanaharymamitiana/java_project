<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Top 5 Médecins | MediAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4"><i class="fas fa-trophy text-warning me-2"></i>Les 5 Médecins les plus consultés</h2>
        <div id="topList" class="row g-4">
            <!-- Loaded via JS -->
        </div>
        <div class="mt-4">
            <a href="/Admin-acceuil" class="btn btn-secondary">Retour à l'accueil</a>
        </div>
    </div>

    <script>
        async function loadTop() {
            const res = await fetch('/api/rdv/top5');
            const meds = await res.json();
            const container = document.getElementById('topList');
            container.innerHTML = '';

            meds.forEach((med, index) => {
                container.innerHTML += `
                    <div class="col-md-12">
                        <div class="card shadow-sm border-start border-primary border-4">
                            <div class="card-body d-flex align-items-center">
                                <h1 class="display-4 me-4 text-primary opacity-25">#${index + 1}</h1>
                                <div>
                                    <h4 class="fw-bold mb-0">${med.nommed}</h4>
                                    <p class="text-muted mb-0">${med.specialite}</p>
                                    <small class="text-info">${med.lieu}</small>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        loadTop();
    </script>
</body>
</html>
